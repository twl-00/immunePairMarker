<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">immunePair workflow overview</title>
  <desc id="desc">Simplified workflow for pairwise gene marker analysis from input data to candidate gene pairs and downstream plots.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#405261"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2933; }
      .label { font: 700 20px Arial, sans-serif; fill: #1f2933; }
      .body { font: 16px Arial, sans-serif; fill: #334155; }
      .small { font: 14px Arial, sans-serif; fill: #475569; }
      .box { stroke-width: 2; rx: 8; ry: 8; }
      .arrow { stroke: #405261; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .soft-arrow { stroke: #708090; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="430" fill="#ffffff"/>
  <text x="550" y="42" text-anchor="middle" class="title">immunePair workflow overview</text>

  <rect x="40" y="95" width="205" height="105" class="box" fill="#f3d2ce" stroke="#c48f88"/>
  <text x="142.5" y="132" text-anchor="middle" class="label">Input data</text>
  <text x="142.5" y="162" text-anchor="middle" class="body">Expression matrix</text>
  <text x="142.5" y="185" text-anchor="middle" class="small">genes x samples</text>

  <rect x="40" y="230" width="205" height="105" class="box" fill="#f3d2ce" stroke="#c48f88"/>
  <text x="142.5" y="267" text-anchor="middle" class="label">Clinical table</text>
  <text x="142.5" y="297" text-anchor="middle" class="body">Response labels</text>
  <text x="142.5" y="320" text-anchor="middle" class="small">optional OS/PFS</text>

  <path d="M 245 148 L 315 148" class="arrow"/>
  <path d="M 245 282 L 285 282 Q 305 282 305 250 L 305 178 Q 305 148 315 148" class="soft-arrow"/>

  <rect x="330" y="95" width="190" height="105" class="box" fill="#d8e9f7" stroke="#8cb6d9"/>
  <text x="425" y="132" text-anchor="middle" class="label">Preprocess</text>
  <text x="425" y="162" text-anchor="middle" class="body">Clean and filter genes</text>
  <text x="425" y="185" text-anchor="middle" class="small">align matched samples</text>

  <path d="M 520 148 L 590 148" class="arrow"/>

  <rect x="605" y="95" width="190" height="105" class="box" fill="#d8e9f7" stroke="#8cb6d9"/>
  <text x="700" y="132" text-anchor="middle" class="label">Define response</text>
  <text x="700" y="162" text-anchor="middle" class="body">Encode response vs.</text>
  <text x="700" y="185" text-anchor="middle" class="body">non-response</text>

  <path d="M 795 148 L 865 148" class="arrow"/>

  <rect x="880" y="95" width="180" height="105" class="box" fill="#d8e9f7" stroke="#8cb6d9"/>
  <text x="970" y="132" text-anchor="middle" class="label">Screen pairs</text>
  <text x="970" y="162" text-anchor="middle" class="body">Chi-square screen</text>
  <text x="970" y="185" text-anchor="middle" class="small">Fisher test + BH</text>

  <path d="M 970 200 L 970 248 Q 970 268 950 268 L 785 268" class="arrow"/>

  <rect x="560" y="230" width="225" height="115" class="box" fill="#dff1e5" stroke="#9bc6a7"/>
  <text x="672.5" y="267" text-anchor="middle" class="label">Result tables</text>
  <text x="672.5" y="297" text-anchor="middle" class="body">Candidate gene pairs</text>
  <text x="672.5" y="320" text-anchor="middle" class="small">OR, p value, adjusted p</text>

  <path d="M 560 288 L 490 288" class="arrow"/>

  <rect x="275" y="230" width="215" height="115" class="box" fill="#e8e2f5" stroke="#b9a6dc"/>
  <text x="382.5" y="267" text-anchor="middle" class="label">Downstream plots</text>
  <text x="382.5" y="297" text-anchor="middle" class="body">ROC curves</text>
  <text x="382.5" y="320" text-anchor="middle" class="small">OS/PFS survival curves</text>

  <rect x="835" y="250" width="225" height="95" class="box" fill="#dff1e5" stroke="#9bc6a7"/>
  <text x="947.5" y="286" text-anchor="middle" class="label">Export</text>
  <text x="947.5" y="316" text-anchor="middle" class="body">Tables and plot files</text>

  <path d="M 785 300 L 820 300" class="arrow"/>

  <text x="550" y="392" text-anchor="middle" class="small">README schematic for the immunePair R package. This is a simplified package workflow, not a manuscript figure.</text>
</svg>
